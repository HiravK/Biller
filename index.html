<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spazorlabs LLP — Invoice Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2744;--navy2:#2d4070;--gold:#c9a84c;--gold2:#e8c97a;
  --pale:#fdf6e3;--surf:#fafaf8;--surf2:#f2f0eb;
  --bdr:#e0dbd0;--bdr2:#c5bfb0;--soft:#888;--mid:#444;
  --red:#c0392b;--grn:#1e8a4a;
  --sh:0 2px 8px rgba(0,0,0,.07),0 8px 32px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#e9e5dc;color:#111;min-height:100vh;
  background-image:radial-gradient(ellipse at 15% 5%,rgba(201,168,76,.08) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 95%,rgba(26,39,68,.06) 0%,transparent 55%)}

/* ── LAYOUT ── */
.shell{max-width:1100px;margin:0 auto;padding:24px 16px 80px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.top-logo{height:40px;object-fit:contain}
.top-actions{display:flex;gap:8px;align-items:center}

/* ── TABS ── */
.nav-tabs{display:flex;gap:0;border-bottom:2px solid var(--bdr);margin-bottom:0}
.nav-tab{font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;padding:10px 18px;background:none;border:none;cursor:pointer;
  color:var(--soft);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.nav-tab.active{color:var(--navy);border-bottom-color:var(--gold)}

/* ── PANEL ── */
.panel{display:none}.panel.active{display:block}

/* ── FORM CARD ── */
.fcard{background:var(--surf);border:1px solid var(--bdr);border-radius:4px;
  box-shadow:var(--sh);overflow:hidden;margin-bottom:16px}
.fcard-hd{background:var(--navy);padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.fcard-hd-title{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--gold2);font-weight:400}
.fcard-body{padding:18px 20px}

/* ── COMPACT FORM GRID ── */
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.f{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.f.w2{flex:2}.f.w3{flex:3}.f.full{flex:1 0 100%}
.f label{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
.f input,.f select,.f textarea{
  font-family:'DM Sans',sans-serif;font-size:12.5px;color:#111;background:#fff;
  border:1px solid var(--bdr);border-radius:2px;padding:7px 10px;outline:none;
  transition:border-color .15s,box-shadow .15s;width:100%}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12)}
.f textarea{resize:vertical;min-height:56px}
.f input[readonly]{color:var(--mid);background:var(--surf2)!important;cursor:default;border-color:transparent!important;box-shadow:none!important}

/* ── INLINE PARTY GRID ── */
.party-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.party-box{border:1px solid var(--bdr);border-radius:3px;padding:14px 16px}
.party-label{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.party-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--bdr),transparent)}

/* ── ITEMS TABLE ── */
.items-wrap{overflow-x:auto;margin-bottom:12px}
table.it{width:100%;border-collapse:collapse;font-size:12px;min-width:780px}
table.it thead tr{background:var(--navy)}
table.it thead th{padding:8px 8px;text-align:left;font-size:9px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.75);white-space:nowrap}
table.it thead th:last-child,table.it thead th.r{text-align:right}
table.it tbody tr{border-bottom:1px solid var(--bdr);transition:background .1s}
table.it tbody tr:hover{background:var(--pale)}
table.it tbody td{padding:5px 5px;vertical-align:middle}
table.it tfoot{border-top:2px solid var(--bdr2)}
table.it tfoot td{padding:5px 10px;font-size:12px}
table.it input,table.it select{
  font-family:'DM Sans',sans-serif;font-size:12px;color:#111;background:transparent;
  border:1px solid transparent;border-radius:2px;padding:5px 7px;width:100%;outline:none;
  transition:border-color .15s,background .15s}
table.it input:focus,table.it select:focus{background:#fff;border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.15)}
table.it input[readonly]{color:var(--mid);cursor:default}
.cno{width:30px;text-align:center!important}
.cdesc{min-width:150px}
.chsn{width:90px}
.cqty{width:60px}
.cunit{width:78px}
.crate{width:90px}
.ctax{width:78px}
.cpre{width:95px}
.ctxa{width:85px}
.ctot{width:95px}
.cdel{width:30px;text-align:center!important}
.btn-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;
  padding:3px;border-radius:2px;transition:color .15s;line-height:1}
.btn-del:hover{color:var(--red)}

/* ── TOTALS BOX ── */
.totals-row-outer{display:flex;justify-content:flex-end;margin-top:16px}
.totals-box{width:300px;border:1px solid var(--bdr);border-radius:3px;overflow:hidden}
.t-row{display:flex;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--bdr);font-size:12px}
.t-row:last-child{border:none}
.t-row .lbl{color:var(--soft);font-size:11px}
.t-row .amt{font-weight:600;font-variant-numeric:tabular-nums}
.t-row.grand{background:var(--navy);color:#fff}
.t-row.grand .lbl{color:rgba(255,255,255,.6);font-size:12px}
.t-row.grand .amt{color:var(--gold2);font-size:14px}

/* ── BUTTONS ── */
.btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:9px 18px;border-radius:2px;border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,39,68,.25)}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:var(--gold2);color:#111}
.btn-ghost{background:transparent;color:var(--mid);border:1px solid var(--bdr2)}
.btn-ghost:hover{background:var(--surf2)}
.btn-sm{font-size:10px;padding:7px 13px}
.btn-danger{background:transparent;color:var(--red);border:1px solid #f5c6c3}
.btn-danger:hover{background:#fdf3f3}

/* ── INVOICE DB TABLE ── */
.db-table{width:100%;border-collapse:collapse;font-size:13px}
.db-table th{background:var(--navy);color:rgba(255,255,255,.8);padding:9px 12px;
  text-align:left;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600}
.db-table td{padding:9px 12px;border-bottom:1px solid var(--bdr)}
.db-table tr:hover td{background:var(--pale)}
.db-table .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-paid{background:#d4edda;color:#155724}
.badge-pending{background:#fff3cd;color:#856404}
.badge-draft{background:#e2e3e5;color:#495057}
.empty-state{text-align:center;padding:40px;color:var(--soft);font-size:13px}

/* ── OVERLAY / PREVIEW ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(10,10,10,.75);z-index:200;
  align-items:flex-start;justify-content:center;padding:32px 12px;overflow-y:auto;backdrop-filter:blur(4px)}
#overlay.open{display:flex}
.ov-actions{width:100%;max-width:800px;display:flex;gap:10px;margin-bottom:14px;
  align-items:center;justify-content:space-between}

/* ── INVOICE PRINT PAGE ── */
#inv-page{
  background:#fff;width:800px;max-width:100%;
  position:relative;overflow:hidden;
  font-family:'DM Sans',sans-serif;font-size:9.5pt;color:#1a1a1a;
  box-shadow:0 8px 40px rgba(0,0,0,.15);
}

/* Letterhead top bar */
.lh-top{
  position:relative;
  background:#fff;
  border-bottom:3px solid #29b8d0;
  overflow:hidden;
}
.lh-top-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px 14px 24px;
  position:relative;
  z-index:2;
}
/* Corner deco - only on far right corner, clipped by overflow:hidden */
.lh-top-deco{
  position:absolute;top:0;right:0;
  width:90px;height:90px;
  z-index:1;
  pointer-events:none;
}
.lh-top-deco::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:80px;height:80px;background:var(--navy);
  transform:rotate(45deg);
}
.lh-top-deco::after{
  content:'';position:absolute;top:-15px;right:-15px;
  width:60px;height:60px;background:#29b8d0;
  transform:rotate(45deg);
}
.lh-logo{height:56px;object-fit:contain}
.inv-title-word{
  font-family:'Playfair Display',serif;font-size:20pt;font-weight:400;
  letter-spacing:.04em;color:var(--gold);line-height:1;
}
.inv-title-num{
  font-size:8.5pt;letter-spacing:.1em;color:#aaa;font-weight:500;
  margin-top:2px;
}
.inv-title-block-hdr{
  flex:1;
  text-align:right;
  position:relative;z-index:2;
  padding-right:96px;
}

.lh-meta{
  background:#f0fafc;border-top:1px solid #b8eaf3;border-bottom:1px solid #b8eaf3;
  padding:6px 24px;display:flex;gap:20px;flex-wrap:wrap;font-size:8pt;
}
.lh-meta span{font-weight:700;color:var(--navy)}

.inv-body{padding:14px 24px}

.parties-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.inv-party{border:1px solid var(--bdr);border-radius:3px;padding:9px 12px}
.inv-pty-lbl{font-size:6.5pt;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);margin-bottom:3px}
.inv-pty-name{font-family:'Playfair Display',serif;font-size:11pt;font-weight:600;
  color:var(--navy);line-height:1.2;margin-bottom:2px}
.inv-pty-detail{font-size:8pt;line-height:1.5;color:#444}
.inv-pty-gst{display:inline-block;background:var(--surf2);border:1px solid var(--bdr);
  border-radius:2px;padding:1px 6px;font-size:7pt;font-weight:700;color:var(--navy);
  margin-top:3px;letter-spacing:.04em}

/* items */
.inv-tbl{width:100%;border-collapse:collapse;font-size:8pt;margin-bottom:8px}
.inv-tbl thead tr{background:var(--navy)}
.inv-tbl thead th{padding:5px 6px;text-align:left;color:rgba(255,255,255,.85);
  font-size:7pt;font-weight:700;letter-spacing:.08em}
.inv-tbl thead th.r{text-align:right}
.inv-tbl tbody tr{border-bottom:1px solid var(--bdr)}
.inv-tbl tbody tr:nth-child(even){background:#fafaf8}
.inv-tbl tbody td{padding:4px 6px;vertical-align:top}
.inv-tbl tbody td.r{text-align:right}
.inv-tbl tfoot{border-top:2px solid var(--bdr2)}
.inv-tbl tfoot td{padding:3px 6px;font-size:8pt}
.inv-tbl tfoot tr.sub td{color:#666}
.inv-tbl tfoot tr.grand{background:var(--navy);color:#fff}
.inv-tbl tfoot tr.grand td{padding:6px 6px;font-weight:700;font-size:9.5pt}
.inv-tbl tfoot tr.grand td.r{color:var(--gold2)}

.inv-words{border:1px solid var(--bdr);border-radius:2px;padding:4px 10px;
  font-size:8pt;font-style:italic;color:#555;margin-bottom:10px}
.inv-words strong{font-style:normal;color:var(--navy)}

.inv-footer-row{display:flex;justify-content:space-between;align-items:flex-end;
  padding-top:8px;border-top:1px solid var(--bdr);margin-top:4px}
.inv-bank{font-size:7.5pt;color:#555;line-height:1.6}
.inv-bank strong{color:var(--navy);display:block;font-size:8pt;margin-bottom:2px}
.inv-sign{text-align:right}
.inv-sign-line{width:110px;height:1px;background:var(--bdr2);margin:18px 0 3px auto}
.inv-sign-lbl{font-size:7pt;color:var(--soft);letter-spacing:.06em}
.inv-sign-name{font-size:8pt;font-weight:700;color:var(--navy);margin-top:1px}

/* Letterhead bottom bar */
.lh-bottom{
  background:var(--navy);
  position:relative;overflow:hidden;
  padding:10px 24px;
  display:flex;align-items:center;gap:20px;
}
.lh-bottom::before{
  content:'';position:absolute;left:-20px;bottom:-20px;
  width:70px;height:70px;background:#29b8d0;
  transform:rotate(45deg);
}
.lh-bottom::after{
  content:'';position:absolute;left:20px;bottom:-30px;
  width:60px;height:60px;background:rgba(255,255,255,.08);
  transform:rotate(45deg);
}
.lh-bottom-text{font-size:7.5pt;color:rgba(255,255,255,.8);line-height:1.7;margin-left:64px}
.lh-bottom-text strong{color:#fff}
.lh-bottom-divider{width:1px;height:28px;background:rgba(255,255,255,.2)}

/* ── STATUS BADGE ── */
.status-bar{display:flex;align-items:center;gap:8px;padding:8px 24px;
  background:var(--surf2);border-bottom:1px solid var(--bdr);font-size:11px}
.status-bar label{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
.status-bar select{font-family:'DM Sans',sans-serif;font-size:12px;
  border:1px solid var(--bdr);border-radius:2px;padding:4px 8px;outline:none;background:#fff}
.status-bar select:focus{border-color:var(--gold)}

/* ── TOAST ── */
#toast{position:fixed;bottom:28px;right:28px;background:var(--navy);color:#fff;
  padding:10px 18px;border-radius:3px;font-size:12.5px;box-shadow:0 4px 20px rgba(0,0,0,.2);
  transform:translateY(60px);opacity:0;transition:all .25s;z-index:300;pointer-events:none;
  border-left:3px solid var(--gold)}
#toast.show{transform:translateY(0);opacity:1}

/* ── MISC ── */
hr.div{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.section-lbl{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-lbl::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--bdr),transparent)}
.flex-end{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.inline-check{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;color:var(--mid)}

@media(max-width:640px){
  .party-grid,.parties-grid{grid-template-columns:1fr}
  #inv-page{width:100%}
  .row{flex-direction:column}
}
@media print{
  body,#overlay{background:none!important;padding:0!important}
  #overlay{position:static!important;padding:0!important}
  .ov-actions{display:none!important}
  #inv-page{box-shadow:none!important;width:100%!important}
}
</style>
</head>

<script>
// ══════════════════════════════════════
//  DATABASE  (localStorage)
// ══════════════════════════════════════
const DB_KEY = 'spazorlabs_invoices';
const COUNTER_KEY = 'spazorlabs_inv_counter';

function loadDB() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); } catch { return []; }
}
function saveDB(data) {
  localStorage.setItem(DB_KEY, JSON.stringify(data));
}
function getNextCounter() {
  const c = parseInt(localStorage.getItem(COUNTER_KEY) || '0') + 1;
  localStorage.setItem(COUNTER_KEY, String(c));
  return c;
}
function generateInvNo() {
  const now = new Date();
  const yr = now.getFullYear();
  const nextYr = String(yr + 1).slice(2);
  const fy = `${yr}-${nextYr}`; // e.g. 2025-26
  const seq = String(getNextCounter()).padStart(4,'0');
  return `SPZ/${fy}/${seq}`;
}
function isInvNoDuplicate(no) {
  return loadDB().some(inv => inv.invNo === no);
}

// ══════════════════════════════════════
//  HSN / TAX data
// ══════════════════════════════════════
const HSN = ['998311','998312','998313','998314','998315','998316','998319',
  '998321','998322','998331','998332','998333','998411','84713','84714',
  '85171','85176','85177','8528','9983','9984','9985','9987'];
const TAX_RATES = ['0','5','10','12','18'];

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
let rowCount = 0;
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  document.getElementById('inv_date').value = fmt(today);
  const due = new Date(today); due.setDate(due.getDate()+30);
  document.getElementById('due_date').value = fmt(due);
  document.getElementById('inv_no').value = generateInvNo();
  addRow(); addRow();
  calcTotals();
  renderHistory();
  updateHistCount();
});

// ══════════════════════════════════════
//  PANEL SWITCH
// ══════════════════════════════════════
function showPanel(p) {
  ['create','history'].forEach(n => {
    document.getElementById('panel-'+n).classList.toggle('active', n===p);
    document.getElementById('tab-'+n).classList.toggle('active', n===p);
  });
  if (p==='history') renderHistory();
}

// ══════════════════════════════════════
//  COPY BUYER → PAYER
// ══════════════════════════════════════
function copyBuyer(cb) {
  ['name','gst','addr','city','pin','email','phone','contact'].forEach(f => {
    document.getElementById('payer_'+f).value = cb.checked
      ? (document.getElementById('buyer_'+f)?.value || '') : '';
  });
}

// ══════════════════════════════════════
//  ROWS
// ══════════════════════════════════════
function addRow(isHdr=false) {
  rowCount++;
  const id = rowCount;
  const tbody = document.getElementById('items-body');
  const tr = document.createElement('tr');
  tr.dataset.id = id;

  if (isHdr) {
    tr.innerHTML = `
      <td class="cno" style="color:var(--soft);font-size:10px">—</td>
      <td colspan="9"><input type="text" data-role="header" placeholder="Section heading / note"
        style="font-weight:700;font-size:12.5px;color:var(--navy);width:100%"></td>
      <td class="cdel"><button class="btn-del" onclick="delRow(${id})">✕</button></td>`;
    tr.style.background='var(--pale)';
    tbody.appendChild(tr); return;
  }

  const hsnOpts = HSN.map(h=>`<option value="${h}">${h}</option>`).join('');
  const taxOpts = TAX_RATES.map(r=>`<option value="${r}"${r==='18'?' selected':''}>${r}%</option>`).join('');

  tr.innerHTML = `
    <td class="cno" style="text-align:center;color:var(--soft);font-size:11px">${id}</td>
    <td class="cdesc"><input type="text" data-role="desc" placeholder="Description" onchange="calcTotals()"></td>
    <td class="chsn"><input type="text" data-role="hsn" placeholder="HSN" list="hl${id}" style="width:100%">
      <datalist id="hl${id}">${hsnOpts}</datalist></td>
    <td class="cqty"><input type="number" data-role="qty" value="1" min="0" step="any"
      oninput="calcRow(${id})" style="text-align:right;width:100%"></td>
    <td class="cunit"><select data-role="unit" style="width:100%">
      <option>Nos</option><option>Hrs</option><option>Days</option><option>Months</option>
      <option>Kg</option><option>Ltr</option><option>Mtr</option><option>Sqft</option>
      <option>Set</option><option>Pcs</option></select></td>
    <td class="crate"><input type="number" data-role="rate" value="0" min="0" step="any"
      oninput="calcRow(${id})" style="text-align:right;width:100%"></td>
    <td class="ctax"><select data-role="tax" onchange="calcRow(${id})" style="width:100%;text-align:right">${taxOpts}</select></td>
    <td class="cpre"><input type="text" data-field="pretax" readonly style="text-align:right;width:100%"></td>
    <td class="ctxa"><input type="text" data-field="taxamt" readonly style="text-align:right;width:100%"></td>
    <td class="ctot"><input type="text" data-field="total" readonly
      style="text-align:right;font-weight:700;color:var(--navy);width:100%"></td>
    <td class="cdel"><button class="btn-del" onclick="delRow(${id})">✕</button></td>`;
  tbody.appendChild(tr);
  calcRow(id);
}

function delRow(id) {
  document.querySelector(`tr[data-id="${id}"]`)?.remove();
  calcTotals();
}

function calcRow(id) {
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  if (!tr || tr.querySelector('[data-role="header"]')) return;
  const qty  = parseFloat(tr.querySelector('[data-role="qty"]')?.value)  || 0;
  const rate = parseFloat(tr.querySelector('[data-role="rate"]')?.value) || 0;
  const tax  = parseFloat(tr.querySelector('[data-role="tax"]')?.value)  || 0;
  const pre  = qty * rate;
  const ta   = pre * tax / 100;
  tr.querySelector('[data-field="pretax"]').value = pre.toFixed(2);
  tr.querySelector('[data-field="taxamt"]').value = ta.toFixed(2);
  tr.querySelector('[data-field="total"]').value  = (pre+ta).toFixed(2);
  calcTotals();
}

function calcTotals() {
  const cur = document.getElementById('currency').value;
  let sp=0, st=0;
  document.querySelectorAll('#items-body tr').forEach(tr => {
    if (tr.querySelector('[data-role="header"]')) return;
    sp += parseFloat(tr.querySelector('[data-field="pretax"]')?.value||0)||0;
    st += parseFloat(tr.querySelector('[data-field="taxamt"]')?.value||0)||0;
  });
  const half = st/2;
  const grand = sp+st;
  const s = id => document.getElementById(id);
  s('t_pre').textContent   = cur+sp.toFixed(2);
  s('t_tax').textContent   = cur+st.toFixed(2);
  s('t_cgst').textContent  = cur+half.toFixed(2);
  s('t_sgst').textContent  = cur+half.toFixed(2);
  s('t_igst').textContent  = cur+st.toFixed(2);
  s('t_grand').textContent = cur+grand.toFixed(2);
  const show = st > 0;
  ['r_cgst','r_sgst','r_igst'].forEach(id => s(id).style.display = show?'':'none');
}

//  HELPERS

const g = id => document.getElementById(id)?.value?.trim()||'';
const cur = () => g('currency')||'₹';

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${y}`;
}

function num2words(n) {
  const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function w(x) {
    if(x<20) return a[x];
    if(x<100) return b[~~(x/10)]+(x%10?' '+a[x%10]:'');
    if(x<1000) return a[~~(x/100)]+' Hundred'+(x%100?' '+w(x%100):'');
    if(x<1e5) return w(~~(x/1000))+' Thousand'+(x%1000?' '+w(x%1000):'');
    if(x<1e7) return w(~~(x/1e5))+' Lakh'+(x%1e5?' '+w(x%1e5):'');
    return w(~~(x/1e7))+' Crore'+(x%1e7?' '+w(x%1e7):'');
  }
  const [ri,pi] = n.toFixed(2).split('.');
  let r = w(+ri)+' Rupees';
  if (+pi) r += ' and '+w(+pi)+' Paise';
  return r+' Only';
}

// ══════════════════════════════════════
//  COLLECT DATA
// ══════════════════════════════════════
function collectData() {
  let sumPre=0, sumTax=0;
  const items=[];
  document.querySelectorAll('#items-body tr').forEach(tr => {
    if (tr.querySelector('[data-role="header"]')) {
      items.push({type:'header', text: tr.querySelector('[data-role="header"]').value});
      return;
    }
    const pre  = parseFloat(tr.querySelector('[data-field="pretax"]')?.value)||0;
    const ta   = parseFloat(tr.querySelector('[data-field="taxamt"]')?.value)||0;
    const tot  = parseFloat(tr.querySelector('[data-field="total"]')?.value)||0;
    const desc = tr.querySelector('[data-role="desc"]')?.value||'';
    if (!desc && !pre) return;
    sumPre+=pre; sumTax+=ta;
    items.push({
      type:'item',
      desc, hsn: tr.querySelector('[data-role="hsn"]')?.value||'',
      qty:  parseFloat(tr.querySelector('[data-role="qty"]')?.value)||0,
      unit: tr.querySelector('[data-role="unit"]')?.value||'',
      rate: parseFloat(tr.querySelector('[data-role="rate"]')?.value)||0,
      tax:  tr.querySelector('[data-role="tax"]')?.value||'0',
      pre, ta, tot
    });
  });
  return {
    invNo:g('inv_no'), invDate:g('inv_date'), dueDate:g('due_date'),
    placeSupply:g('place_supply'), country:g('country_supply'), currency:g('currency'),
    notes:g('inv_notes'),
    buyer:{name:g('buyer_name'),gst:g('buyer_gst'),addr:g('buyer_addr'),city:g('buyer_city'),
           pin:g('buyer_pin'),email:g('buyer_email'),phone:g('buyer_phone'),contact:g('buyer_contact')},
    payer:{name:g('payer_name'),gst:g('payer_gst'),addr:g('payer_addr'),city:g('payer_city'),
           pin:g('payer_pin'),email:g('payer_email'),phone:g('payer_phone'),contact:g('payer_contact')},
    biller:{name:g('biller_name'),gst:g('biller_gst'),addr:g('biller_addr'),city:g('biller_city'),
            email:g('biller_email'),phone:g('biller_phone'),web:g('biller_web')},
    items, sumPre, sumTax, grand: sumPre+sumTax,
    status:'pending', savedAt: new Date().toISOString()
  };
}

        <td colspan="7" style="text-align:right;color:var(--soft)">Subtotal (Pre-Tax)</td>
        <td class="r" style="font-weight:600">${c}${d.sumPre.toFixed(2)}</td>
        <td class="r" style="font-weight:600">${c}${d.sumTax.toFixed(2)}</td>
        <td class="r" style="font-weight:600">${c}${d.grand.toFixed(2)}</td>
      </tr>
      ${d.sumTax>0?`
      <tr class="sub"><td colspan="8" style="text-align:right;color:var(--soft)">CGST</td>
        <td colspan="2" class="r">${c}${half.toFixed(2)}</td></tr>
      <tr class="sub"><td colspan="8" style="text-align:right;color:var(--soft)">SGST</td>
        <td colspan="2" class="r">${c}${half.toFixed(2)}</td></tr>
      <tr class="sub"><td colspan="8" style="text-align:right;color:var(--soft)">IGST</td>
        <td colspan="2" class="r">${c}${d.sumTax.toFixed(2)}</td></tr>`:''}
      <tr class="grand">
        <td colspan="9">Grand Total</td>
        <td class="r">${c}${d.grand.toFixed(2)}</td>
      </tr>
    </tfoot>
  </table>

  ${c==='₹'?`<div class="inv-words"><strong>Amount in Words:</strong> ${num2words(d.grand)}</div>`:''}

  <div class="inv-footer-row">
    <div class="inv-bank">
      ${d.notes?`<strong>Notes / Terms</strong>${d.notes}`:'<em style="color:#bbb">This is a computer-generated invoice.</em>'}
    </div>
    <div class="inv-sign">
      <div class="inv-sign-line"></div>
      <div class="inv-sign-lbl">Authorised Signatory</div>
      <div class="inv-sign-name">${d.biller.name||'Spazorlabs LLP'}</div>
    </div>
  </div>
</div>

<div class="lh-bottom">
  <div class="lh-bottom-text">
    <strong>${d.biller.email||'info@spazorlabs.com'}</strong>
    ${d.biller.phone||'+91 9509217234'} &nbsp;·&nbsp; ${d.biller.web||'www.spazorlabs.com'}
    &nbsp;·&nbsp; ${[d.biller.addr,d.biller.city].filter(Boolean).join(', ')||'5th Floor BEL, Potheri, Chennai'}
    ${d.biller.gst?`&nbsp;·&nbsp; GSTIN: ${d.biller.gst}`:''}
  </div>
</div>
`;
}

// ══════════════════════════════════════
//  PREVIEW + SAVE
// ══════════════════════════════════════
let _currentData = null;

function generatePreview(saving=false) {
  _currentData = collectData();
  document.getElementById('inv-page').innerHTML = renderInvoiceHTML(_currentData);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}

function doPrint() {
  window.print();
}

function saveAndPrint() {
  const data = collectData();
  // Check for duplicate invoice number
  if (isInvNoDuplicate(data.invNo)) {
    toast('⚠ Duplicate Invoice ID detected! Generating new ID...');
    data.invNo = generateInvNo();
    document.getElementById('inv_no').value = data.invNo;
  }
  // Save to DB
  const db = loadDB();
  db.unshift(data);
  saveDB(db);
  updateHistCount();
  toast(`✓ Invoice ${data.invNo} saved`);
  // Show print preview
  _currentData = data;
  document.getElementById('inv-page').innerHTML = renderInvoiceHTML(data);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ══════════════════════════════════════
//  HISTORY
// ══════════════════════════════════════
function renderHistory() {
  const db = loadDB();
  const cont = document.getElementById('history-container');
  if (!db.length) {
    cont.innerHTML='<div class="empty-state">No invoices saved yet. Create and save your first invoice!</div>';
    return;
  }
  cont.innerHTML=`<table class="db-table">
    <thead><tr>
      <th>Invoice No.</th><th>Buyer</th><th>Date</th><th>Due</th>
      <th>Grand Total</th><th>Status</th><th>Actions</th>
    </tr></thead>
    <tbody>${db.map((inv,i)=>`
      <tr>
        <td style="font-weight:700;color:var(--navy)">${inv.invNo}</td>
        <td>${inv.buyer.name||'—'}</td>
        <td>${fmtDate(inv.invDate)}</td>
        <td>${fmtDate(inv.dueDate)}</td>
        <td style="font-weight:700">${inv.currency||'₹'}${(inv.grand||0).toFixed(2)}</td>
        <td>
          <select onchange="updateStatus(${i},this.value)" style="font-size:11px;border:1px solid var(--bdr);border-radius:10px;padding:2px 8px;outline:none;background:#fff">
            <option value="draft"${inv.status==='draft'?' selected':''}>Draft</option>
            <option value="pending"${inv.status==='pending'?' selected':''}>Pending</option>
            <option value="paid"${inv.status==='paid'?' selected':''}>Paid</option>
          </select>
        </td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="previewSaved(${i})">👁 View</button>
          <button class="btn btn-ghost btn-sm" onclick="loadIntoForm(${i})">✎ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteInv(${i})">🗑</button>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function updateStatus(idx, val) {
  const db = loadDB();
  if (db[idx]) { db[idx].status=val; saveDB(db); }
}

function previewSaved(idx) {
  const db = loadDB();
  _currentData = db[idx];
  document.getElementById('inv-page').innerHTML = renderInvoiceHTML(_currentData);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function loadIntoForm(idx) {
  const db = loadDB();
  const d = db[idx];
  if (!d) return;
  const sv = (id,v) => { const el=document.getElementById(id); if(el) el.value=v||''; };
  sv('inv_no',d.invNo); sv('inv_date',d.invDate); sv('due_date',d.dueDate);
  sv('place_supply',d.placeSupply); sv('country_supply',d.country); sv('currency',d.currency);
  sv('inv_notes',d.notes);
  ['name','gst','addr','city','pin','email','phone','contact'].forEach(f=>{
    sv('buyer_'+f, d.buyer?.[f]||''); sv('payer_'+f, d.payer?.[f]||'');
  });
  ['name','gst','addr','city','email','phone','web'].forEach(f=>sv('biller_'+f, d.biller?.[f]||''));
  // Reload items
  document.getElementById('items-body').innerHTML='';
  rowCount=0;
  (d.items||[]).forEach(item=>{
    if (item.type==='header') { addRow(true); const tr=document.querySelector('#items-body tr:last-child'); if(tr) tr.querySelector('[data-role="header"]').value=item.text||''; return; }
    addRow();
    const tr=document.querySelector('#items-body tr[data-id="'+rowCount+'"]');
    if (!tr) return;
    tr.querySelector('[data-role="desc"]').value=item.desc||'';
    tr.querySelector('[data-role="hsn"]').value=item.hsn||'';
    tr.querySelector('[data-role="qty"]').value=item.qty||1;
    tr.querySelector('[data-role="rate"]').value=item.rate||0;
    tr.querySelector('[data-role="unit"]').value=item.unit||'Nos';
    tr.querySelector('[data-role="tax"]').value=item.tax||'18';
    calcRow(rowCount);
  });
  calcTotals();
  showPanel('create');
  toast('Invoice loaded into editor');
}

function deleteInv(idx) {
  if (!confirm('Delete this invoice?')) return;
  const db = loadDB(); db.splice(idx,1); saveDB(db);
  updateHistCount(); renderHistory();
  toast('Invoice deleted');
}

function clearHistory() {
  if (!confirm('Clear ALL invoice history? This cannot be undone.')) return;
  localStorage.removeItem(DB_KEY);
  updateHistCount(); renderHistory();
  toast('History cleared');
}

function updateHistCount() {
  document.getElementById('hist-count').textContent = loadDB().length;
}

// ══════════════════════════════════════
//  RESET
// ══════════════════════════════════════
function resetForm() {
  if (!confirm('Reset the form? Unsaved data will be lost.')) return;
  ['buyer','payer'].forEach(p=>['name','gst','addr','city','pin','email','phone','contact'].forEach(f=>{
    const el=document.getElementById(p+'_'+f); if(el) el.value='';
  }));
  ['inv_notes','place_supply','buyer_gst','payer_gst'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('items-body').innerHTML='';
  rowCount=0;
  document.getElementById('inv_no').value = generateInvNo();
  addRow(); addRow();
  calcTotals();
  document.getElementById('same_buyer').checked=false;
  toast('Form reset');
}

// ══════════════════════════════════════
//  TOAST
// ══════════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// Close overlay on backdrop click
document.getElementById('overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('overlay')) closeOverlay();
});
</script>
</body>
</html>
